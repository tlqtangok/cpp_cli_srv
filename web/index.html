<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>CLI-SRV GUI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { padding: 20px 32px; border-bottom: 1px solid #2d3748; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.3rem; color: #63b3ed; }
  .container { display: flex; height: calc(100vh - 65px); }
  .sidebar { width: 220px; border-right: 1px solid #2d3748; padding: 16px; overflow-y: auto; }
  .sidebar h3 { font-size: .75rem; text-transform: uppercase; color: #718096; margin-bottom: 10px; letter-spacing: 1px; }
  .cmd-btn { display: block; width: 100%; text-align: left; padding: 8px 12px; margin-bottom: 6px;
    background: #1a202c; border: 1px solid #2d3748; border-radius: 6px; color: #e2e8f0;
    cursor: pointer; font-size: .9rem; transition: background .15s; }
  .cmd-btn:hover, .cmd-btn.active { background: #2b6cb0; border-color: #63b3ed; }
  .main { flex: 1; padding: 24px 32px; display: flex; flex-direction: column; gap: 16px; overflow: auto; }
  label { font-size: .8rem; color: #a0aec0; margin-bottom: 4px; display: block; }
  textarea, input[type=text] {
    width: 100%; padding: 10px 14px; background: #1a202c; border: 1px solid #2d3748;
    border-radius: 6px; color: #e2e8f0; font-family: 'Consolas', monospace; font-size: .9rem;
    resize: vertical; outline: none; transition: border .15s; }
  textarea:focus, input:focus { border-color: #63b3ed; }
  .row { display: flex; gap: 12px; align-items: flex-end; }
  button#runBtn {
    padding: 10px 28px; background: #2b6cb0; border: none; border-radius: 6px;
    color: #fff; font-size: .95rem; cursor: pointer; transition: background .15s; white-space: nowrap; }
  button#runBtn:hover { background: #2c5282; }
  .result-box { flex: 1; background: #1a202c; border: 1px solid #2d3748; border-radius: 8px;
    padding: 14px; font-family: 'Consolas', monospace; font-size: .85rem; white-space: pre-wrap;
    overflow: auto; color: #68d391; min-height: 180px; }
  .result-box.err { color: #fc8181; }
  .curl-box { background: #1a202c; border: 1px solid #2d3748; border-radius: 8px;
    padding: 12px 14px; font-family: 'Consolas', monospace; font-size: .8rem; 
    overflow-x: auto; color: #a0aec0; white-space: pre-wrap; word-break: break-all; }
  .curl-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .copy-btn { padding: 4px 12px; background: #2d3748; border: none; border-radius: 4px;
    color: #a0aec0; font-size: .75rem; cursor: pointer; transition: background .15s; }
  .copy-btn:hover { background: #4a5568; color: #e2e8f0; }
  .os-toggle { display: flex; gap: 4px; }
  .os-btn { padding: 4px 12px; background: #1a202c; border: 1px solid #2d3748; border-radius: 4px;
    color: #a0aec0; font-size: .75rem; cursor: pointer; transition: all .15s; }
  .os-btn.active { background: #2b6cb0; border-color: #63b3ed; color: #fff; }
  .os-btn:hover:not(.active) { background: #2d3748; }
  .tag { font-size: .7rem; padding: 2px 7px; border-radius: 10px; background: #2d3748; color: #a0aec0; }
</style>
</head>
<body>
<header>
  <span style="font-size:1.4rem">⚡</span>
  <h1>CLI-SRV Web GUI</h1>
  <span class="tag" id="statusTag">connecting...</span>
</header>
<div class="container">
  <div class="sidebar">
    <h3>Commands</h3>
    <div id="cmdList">loading...</div>
  </div>
  <div class="main">
    <div>
      <label>Command</label>
      <input type="text" id="cmdInput" placeholder="e.g. echo" oninput="updateCurl()" />
    </div>
    <div>
      <label>Args (JSON)</label>
      <textarea id="argsInput" rows="8" placeholder='{"text": "hello"}' oninput="updateCurl()"></textarea>
    </div>
    <div>
      <div class="curl-label">
        <label>Equivalent curl command</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="os-toggle">
            <button class="os-btn active" id="linuxBtn" onclick="switchOS('linux')">🐧 Linux</button>
            <button class="os-btn" id="windowsBtn" onclick="switchOS('windows')">🪟 Windows</button>
          </div>
          <button class="copy-btn" onclick="copyCurl()">📋 Copy</button>
        </div>
      </div>
      <div class="curl-box" id="curlBox">—</div>
    </div>
    <div class="row">
      <button id="runBtn" onclick="runCmd()">▶ Run</button>
      <label style="color:#718096;font-size:.8rem">Ctrl+Enter to run</label>
    </div>
    <label>Result</label>
    <div class="result-box" id="result">— waiting —</div>
  </div>
</div>
<script>
const API = '';   // 同源，无需前缀

// Token storage for call_shell command
let shellToken = sessionStorage.getItem('shell_token') || '';

// Curl OS preference (default: linux)
let curlOS = localStorage.getItem('curl_os') || 'linux';

async function loadSchema() {
  try {
    const r = await fetch(API + '/get/schema');
    const cmds = await r.json();
    const list = document.getElementById('cmdList');
    list.innerHTML = '';
    document.getElementById('statusTag').textContent = 'connected';
    document.getElementById('statusTag').style.background = '#276749';
    cmds.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cmd-btn';
      btn.title = c.desc;
      btn.textContent = c.name;
      btn.onclick = () => fillCmd(c);
      list.appendChild(btn);
    });
  } catch(e) {
    document.getElementById('statusTag').textContent = 'offline';
    document.getElementById('statusTag').style.background = '#742a2a';
  }
}

function fillCmd(c) {
  document.getElementById('cmdInput').value = c.name;
  const sample = {};
  c.args.forEach(a => {
    sample[a.name] = ('default' in a) ? a.default : (a.required ? `<${a.name}>` : '');
  });
  document.getElementById('argsInput').value = JSON.stringify(sample, null, 2);
  document.querySelectorAll('.cmd-btn').forEach(b => b.classList.toggle('active', b.textContent === c.name));
  updateCurl();
}

function switchOS(os) {
  curlOS = os;
  localStorage.setItem('curl_os', os);
  
  // Update button states
  document.getElementById('linuxBtn').classList.toggle('active', os === 'linux');
  document.getElementById('windowsBtn').classList.toggle('active', os === 'windows');
  
  // Regenerate curl command
  updateCurl();
}

function updateCurl() {
  const cmd = document.getElementById('cmdInput').value.trim();
  const args = document.getElementById('argsInput').value.trim();
  const curlBox = document.getElementById('curlBox');
  
  if (!cmd) {
    curlBox.textContent = '—';
    return;
  }
  
  // Get base URL (window.location.origin gives the current host)
  const baseUrl = window.location.origin;
  
  // Determine if HTTPS and add -k flag if needed
  const isHttps = baseUrl.startsWith('https://');
  const curlFlags = isHttps ? '-k ' : '';
  
  // Build the JSON body
  let jsonBody = { cmd };
  if (args) {
    try {
      const argsObj = JSON.parse(args);
      jsonBody.args = argsObj;
    } catch(e) {
      // Invalid JSON, show it anyway for debugging
      jsonBody.args = {};
    }
  } else {
    jsonBody.args = {};
  }
  
  // Generate curl command based on OS
  let curlCmd;
  if (curlOS === 'windows') {
    // Windows: use double quotes and escape them
    const jsonStr = JSON.stringify(jsonBody).replace(/"/g, '\\"');
    curlCmd = `curl ${curlFlags}-X POST ${baseUrl}/post/run -H "Content-Type: application/json" -d "${jsonStr}"`;
  } else {
    // Linux: use single quotes for both header and data - no escaping needed!
    const jsonStr = JSON.stringify(jsonBody);
    curlCmd = `curl ${curlFlags}-X POST ${baseUrl}/post/run -H 'Content-Type: application/json' -d '${jsonStr}'`;
  }
  
  curlBox.textContent = curlCmd;
}

function copyCurl() {
  const curlBox = document.getElementById('curlBox');
  const text = curlBox.textContent;
  const btn = event.target;
  const originalText = btn.textContent;
  
  if (text === '—') {
    // Show feedback for empty command
    btn.textContent = '⚠ Empty';
    btn.style.background = '#744210';
    setTimeout(() => {
      btn.textContent = originalText;
      btn.style.background = '';
    }, 2000);
    return;
  }
  
  // Try modern clipboard API first
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ Copied';
      btn.style.background = '#276749';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = '';
      }, 2000);
    }).catch(err => {
      // If clipboard API fails, use fallback
      fallbackCopy(text, btn, originalText);
    });
  } else {
    // Use fallback for older browsers
    fallbackCopy(text, btn, originalText);
  }
}

function fallbackCopy(text, btn, originalText) {
  try {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    const success = document.execCommand('copy');
    document.body.removeChild(textarea);
    
    if (success) {
      btn.textContent = '✓ Copied';
      btn.style.background = '#276749';
    } else {
      btn.textContent = '✗ Failed';
      btn.style.background = '#742a2a';
    }
    setTimeout(() => {
      btn.textContent = originalText;
      btn.style.background = '';
    }, 2000);
  } catch (err) {
    btn.textContent = '✗ Error';
    btn.style.background = '#742a2a';
    setTimeout(() => {
      btn.textContent = originalText;
      btn.style.background = '';
    }, 2000);
  }
}

async function runCmd() {
  const cmd  = document.getElementById('cmdInput').value.trim();
  const args_raw = document.getElementById('argsInput').value.trim();
  const box  = document.getElementById('result');
  if (!cmd) { box.textContent = 'please enter a command'; return; }
  let args = {};
  if (args_raw) {
    try { args = JSON.parse(args_raw); }
    catch { box.className = 'result-box err'; box.textContent = 'invalid JSON in args'; return; }
  }

  // For call_shell command, check if token is needed
  let body = { cmd, args };
  if (cmd === 'call_shell') {
    if (!shellToken) {
      shellToken = prompt('call_shell requires authentication. Please enter token:');
      if (!shellToken) {
        box.className = 'result-box err';
        box.textContent = 'Token required for call_shell command';
        return;
      }
      sessionStorage.setItem('shell_token', shellToken);
    }
    body.token = shellToken;
  }

  try {
    const r = await fetch(API + '/post/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    
    // Handle new JSON format: check "code" instead of "ok"
    const isSuccess = data.code === 0;
    box.className = 'result-box' + (isSuccess ? '' : ' err');
    
    // If authentication error (code 6), clear cached token
    if (data.code === 6 && cmd === 'call_shell') {
      shellToken = '';
      sessionStorage.removeItem('shell_token');
      box.textContent = 'Authentication failed. Token cleared.\n\n' + JSON.stringify(data, null, 2);
    } else {
      box.textContent = JSON.stringify(data, null, 2);
    }
  } catch(e) {
    box.className = 'result-box err';
    box.textContent = 'fetch error: ' + e.message;
  }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') runCmd();
});

// Initialize OS button states on load
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('linuxBtn').classList.toggle('active', curlOS === 'linux');
  document.getElementById('windowsBtn').classList.toggle('active', curlOS === 'windows');
});

loadSchema();
</script>
</body>
</html>
